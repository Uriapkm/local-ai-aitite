# Configuración - Abuelo IA

arduino:
  port: "/dev/ttyUSB0"
  baud_rate: 9600
  button_pin: 2
  ir_led_pin: 3

audio:
  whisper_model: "small"
  whisper_language: "es"
  piper_voice: "es_ES-carlfm-medium"

llm:
  model: "gemma4:4b-instruct-q4_K_M"
  context_length: 128000
  temperature: 0.7
  use_vulkan: true

vision:
  enabled: true
  camera_index: 0

tv:
  brand: "Samsung"
  pc_hdmi_port: "HDMI1"

youtube:
  browser: "brave"

memory:
  enabled: true
  max_conversation_history: 20

interface:
  show_subtitles: true
  subtitle_font_size: 48

system:
  log_level: "INFO"
  auto_restart_on_error: true
